name: HireSync CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Need Redis service running for the cache endpoints that don't mock it completely
    # (though conftest uses SimpleCache, the app factory tries to load extensions)
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
          
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Syntax check
      run: |
        python -m py_compile app.py
        python -m py_compile config.py
        python -m py_compile tasks.py
        
    - name: Run Pytest
      env:
        SECRET_KEY: test_secret
        JWT_SECRET_KEY: test_jwt_secret
      run: |
        pytest -v tests/

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker image
      run: docker build -t hiresync-api:latest .
      
    - name: Test Docker image runs
      run: |
        docker run -d --name test-api -p 5000:5000 \
          -e SECRET_KEY=test \
          -e JWT_SECRET_KEY=test \
          hiresync-api:latest
        sleep 5
        docker logs test-api
